<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>محاكي توجيهي 2026</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          boxShadow: {
            soft: '0 10px 30px rgba(0,0,0,0.08)'
          }
        }
      }
    }
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>

  <style>
    body { font-family: Tahoma, Arial, sans-serif; }
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    const CONFIG = {
      API_BASE: "PUT_YOUR_APPS_SCRIPT_WEBAPP_URL_HERE",
      ADMIN_PASSWORD: "admin",
      APP_NAME: "محاكي توجيهي 2026",
      STORAGE_KEYS: {
        user: "tawjihi_user_v1",
        darkMode: "tawjihi_dark_mode_v1"
      }
    };

    function cls(...arr) {
      return arr.filter(Boolean).join(" ");
    }

    function formatDate(ts) {
      try {
        const d = new Date(ts);
        return d.toLocaleString("ar-JO");
      } catch {
        return ts || "-";
      }
    }

    function saveLocal(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function loadLocal(key, fallback = null) {
      try {
        const v = localStorage.getItem(key);
        return v ? JSON.parse(v) : fallback;
      } catch {
        return fallback;
      }
    }

    async function api(action, payload = {}) {
      const body = { action, ...payload };
      const res = await fetch(CONFIG.API_BASE, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "API Error");
      return data;
    }

    function Card({ children, className = "" }) {
      return (
        <div className={cls(
          "bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl shadow-soft",
          className
        )}>
          {children}
        </div>
      );
    }

    function Button({ children, className = "", ...props }) {
      return (
        <button
          {...props}
          className={cls(
            "px-4 py-3 rounded-2xl font-semibold transition active:scale-[0.98]",
            "bg-slate-900 text-white dark:bg-white dark:text-slate-900",
            "disabled:opacity-50 disabled:cursor-not-allowed",
            className
          )}
        >
          {children}
        </button>
      );
    }

    function Input(props) {
      return (
        <input
          {...props}
          className={cls(
            "w-full rounded-2xl border border-slate-300 dark:border-slate-700",
            "bg-white dark:bg-slate-950 text-slate-900 dark:text-slate-100",
            "px-4 py-3 outline-none focus:ring-2 focus:ring-slate-400",
            props.className || ""
          )}
        />
      );
    }

    function TextArea(props) {
      return (
        <textarea
          {...props}
          className={cls(
            "w-full rounded-2xl border border-slate-300 dark:border-slate-700",
            "bg-white dark:bg-slate-950 text-slate-900 dark:text-slate-100",
            "px-4 py-3 outline-none focus:ring-2 focus:ring-slate-400",
            props.className || ""
          )}
        />
      );
    }

    function RichText({ text }) {
      const ref = useRef(null);

      useEffect(() => {
        if (ref.current && window.renderMathInElement) {
          window.renderMathInElement(ref.current, {
            delimiters: [
              { left: "$$", right: "$$", display: true },
              { left: "$", right: "$", display: false }
            ],
            throwOnError: false
          });
        }
      }, [text]);

      return <div ref={ref} className="leading-8 whitespace-pre-wrap">{text}</div>;
    }

    function LoginScreen({ onLogin }) {
      const [name, setName] = useState("");

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <Card className="w-full max-w-md p-6">
            <div className="text-center mb-6">
              <h1 className="text-2xl font-black text-slate-900 dark:text-white">{CONFIG.APP_NAME}</h1>
              <p className="text-slate-500 dark:text-slate-400 mt-2">
                أدخل اسمك للبدء
              </p>
            </div>

            <div className="space-y-4">
              <Input
                placeholder="الاسم الكامل"
                value={name}
                onChange={e => setName(e.target.value)}
              />
              <Button
                className="w-full"
                onClick={() => {
                  const clean = name.trim();
                  if (!clean) return alert("أدخل الاسم أولاً");
                  const user = { id: clean.replace(/\s+/g, "_"), name: clean };
                  saveLocal(CONFIG.STORAGE_KEYS.user, user);
                  onLogin(user);
                }}
              >
                دخول
              </Button>
            </div>
          </Card>
        </div>
      );
    }

    function TopBar({ user, darkMode, setDarkMode, onOpenAdmin, onLogout }) {
      return (
        <div className="sticky top-0 z-20 backdrop-blur bg-white/80 dark:bg-slate-950/80 border-b border-slate-200 dark:border-slate-800">
          <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
            <div>
              <div className="font-black text-slate-900 dark:text-white">{CONFIG.APP_NAME}</div>
              <div className="text-sm text-slate-500 dark:text-slate-400">{user.name}</div>
            </div>

            <div className="flex items-center gap-2">
              <button
                className="px-3 py-2 rounded-xl border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-200"
                onClick={() => {
                  const next = !darkMode;
                  setDarkMode(next);
                  saveLocal(CONFIG.STORAGE_KEYS.darkMode, next);
                }}
              >
                {darkMode ? "☀️" : "🌙"}
              </button>

              <button
                className="px-3 py-2 rounded-xl border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-200"
                onClick={onOpenAdmin}
              >
                Admin
              </button>

              <button
                className="px-3 py-2 rounded-xl border border-red-300 text-red-600"
                onClick={onLogout}
              >
                خروج
              </button>
            </div>
          </div>
        </div>
      );
    }

    function Dashboard({ exams, stats, wrongQuestions, onStartExam, refresh }) {
      return (
        <div className="max-w-6xl mx-auto p-4 space-y-4">
          <div className="grid md:grid-cols-3 gap-4">
            <Card className="p-5">
              <div className="text-sm text-slate-500 dark:text-slate-400">عدد الامتحانات</div>
              <div className="text-3xl font-black text-slate-900 dark:text-white mt-2">{exams.length}</div>
            </Card>
            <Card className="p-5">
              <div className="text-sm text-slate-500 dark:text-slate-400">المعدل العام</div>
              <div className="text-3xl font-black text-slate-900 dark:text-white mt-2">
                {stats.avgScore != null ? stats.avgScore + "%" : "-"}
              </div>
            </Card>
            <Card className="p-5">
              <div className="text-sm text-slate-500 dark:text-slate-400">الامتحانات المنجزة</div>
              <div className="text-3xl font-black text-slate-900 dark:text-white mt-2">{stats.completed}</div>
            </Card>
          </div>

          <Card className="p-5">
            <div className="flex items-center justify-between mb-4">
              <h2 className="font-black text-slate-900 dark:text-white">الامتحانات المتاحة</h2>
              <button
                className="text-sm text-slate-500 dark:text-slate-400"
                onClick={refresh}
              >
                تحديث
              </button>
            </div>

            <div className="grid md:grid-cols-2 xl:grid-cols-3 gap-4">
              {exams.map(exam => (
                <div
                  key={exam.id}
                  className="rounded-2xl border border-slate-200 dark:border-slate-800 p-4"
                >
                  <div className="font-bold text-slate-900 dark:text-white">{exam.subject}</div>
                  <div className="text-sm text-slate-500 dark:text-slate-400 mt-1">
                    مدة الامتحان: {Math.floor((exam.duration || 0) / 60)} دقيقة
                  </div>
                  <div className="text-sm text-slate-500 dark:text-slate-400">
                    اختيار من متعدد: {(exam.questions || []).length}
                  </div>
                  <div className="text-sm text-slate-500 dark:text-slate-400 mb-4">
                    مقالي: {(exam.openQuestions || []).length}
                  </div>
                  <Button className="w-full" onClick={() => onStartExam(exam.id)}>
                    ابدأ الامتحان
                  </Button>
                </div>
              ))}
            </div>
          </Card>

          <Card className="p-5">
            <h2 className="font-black text-slate-900 dark:text-white mb-4">نقاط الضعف</h2>
            {wrongQuestions.length === 0 ? (
              <div className="text-slate-500 dark:text-slate-400">لا توجد أخطاء محفوظة بعد.</div>
            ) : (
              <div className="space-y-3">
                {wrongQuestions.slice(0, 10).map((item, i) => (
                  <div key={i} className="rounded-2xl border border-slate-200 dark:border-slate-800 p-4">
                    <div className="text-sm text-slate-500 dark:text-slate-400">{item.subject}</div>
                    <div className="font-semibold text-slate-900 dark:text-white mt-1">{item.questionText}</div>
                    <div className="text-sm text-red-600 mt-2">إجابتك: {item.userAnswerText || "-"}</div>
                    <div className="text-sm text-emerald-600">الصحيح: {item.correctAnswerText || "-"}</div>
                  </div>
                ))}
              </div>
            )}
          </Card>
        </div>
      );
    }

    function ExamScreen({ exam, user, onFinish, onCancel }) {
      const mcq = exam.questions || [];
      const openQ = exam.openQuestions || [];
      const totalSeconds = exam.duration || 3600;

      const [timeLeft, setTimeLeft] = useState(totalSeconds);
      const [answers, setAnswers] = useState({});
      const [openAnswers, setOpenAnswers] = useState({});
      const [submitted, setSubmitted] = useState(false);
      const [result, setResult] = useState(null);

      useEffect(() => {
        if (submitted) return;
        const t = setInterval(() => {
          setTimeLeft(prev => {
            if (prev <= 1) {
              clearInterval(t);
              handleSubmit();
              return 0;
            }
            return prev - 1;
          });
        }, 1000);
        return () => clearInterval(t);
      }, [submitted]);

      function setAnswer(qid, idx) {
        setAnswers(prev => ({ ...prev, [qid]: idx }));
      }

      function setOpenAnswer(qid, value) {
        setOpenAnswers(prev => ({ ...prev, [qid]: value }));
      }

      function handleSubmit() {
        if (submitted) return;

        let correct = 0;
        const wrongItems = [];

        mcq.forEach(q => {
          const userIndex = answers[q.id];
          if (userIndex === q.correctIndex) {
            correct++;
          } else {
            wrongItems.push({
              questionId: q.id,
              questionText: q.text,
              userAnswerIndex: userIndex ?? null,
              userAnswerText: userIndex != null ? q.options[userIndex] : "",
              correctIndex: q.correctIndex,
              correctAnswerText: q.options[q.correctIndex] || "",
              explanation: q.explanation || "",
              subject: exam.subject
            });
          }
        });

        const score = mcq.length ? Math.round((correct / mcq.length) * 100) : 100;

        const payload = {
          userId: user.id,
          userName: user.name,
          examId: exam.id,
          subject: exam.subject,
          score,
          answers,
          openAnswers,
          wrongItems
        };

        setSubmitted(true);
        setResult({
          score,
          wrongItems,
          openAnswersSnapshot: openAnswers
        });

        onFinish(payload);
      }

      const minutes = String(Math.floor(timeLeft / 60)).padStart(2, "0");
      const seconds = String(timeLeft % 60).padStart(2, "0");

      if (submitted && result) {
        return (
          <div className="max-w-4xl mx-auto p-4 space-y-4">
            <Card className="p-6">
              <h2 className="text-2xl font-black text-slate-900 dark:text-white">تم تسليم الامتحان</h2>
              <div className="text-5xl font-black mt-4 text-slate-900 dark:text-white">{result.score}%</div>
            </Card>

            <Card className="p-6">
              <h3 className="font-black text-slate-900 dark:text-white mb-4">تصحيح الأسئلة الخاطئة</h3>
              {result.wrongItems.length === 0 ? (
                <div className="text-emerald-600 font-bold">ممتاز، لا توجد أخطاء.</div>
              ) : (
                <div className="space-y-4">
                  {result.wrongItems.map((w, i) => (
                    <div key={i} className="border border-slate-200 dark:border-slate-800 rounded-2xl p-4">
                      <div className="font-bold text-slate-900 dark:text-white mb-2">
                        <RichText text={w.questionText} />
                      </div>
                      <div className="text-sm text-red-600">إجابتك: {w.userAnswerText || "لم تجب"}</div>
                      <div className="text-sm text-emerald-600 mt-1">الصحيح: {w.correctAnswerText}</div>
                      {w.explanation ? (
                        <div className="text-sm text-slate-600 dark:text-slate-300 mt-3">
                          التفسير: {w.explanation}
                        </div>
                      ) : null}
                    </div>
                  ))}
                </div>
              )}
            </Card>

            {exam.openQuestions?.length ? (
              <Card className="p-6">
                <h3 className="font-black text-slate-900 dark:text-white mb-4">الأسئلة المقالية</h3>
                <div className="space-y-4">
                  {exam.openQuestions.map(q => (
                    <div key={q.id} className="border border-slate-200 dark:border-slate-800 rounded-2xl p-4">
                      <div className="font-bold text-slate-900 dark:text-white mb-3">
                        <RichText text={q.prompt} />
                      </div>
                      <div className="text-sm text-slate-500 dark:text-slate-400 mb-2">إجابتك:</div>
                      <div className="rounded-xl bg-slate-50 dark:bg-slate-800 p-3 mb-3 whitespace-pre-wrap">
                        {result.openAnswersSnapshot[q.id] || "لم تتم الإجابة"}
                      </div>
                      <div className="text-sm text-emerald-700 dark:text-emerald-400 mb-2">الإجابة النموذجية:</div>
                      <div className="rounded-xl bg-emerald-50 dark:bg-emerald-950/30 p-3 whitespace-pre-wrap">
                        {q.idealAnswer || "-"}
                      </div>
                      <div className="text-sm text-slate-600 dark:text-slate-300 mt-3">
                        {q.explanation || ""}
                      </div>
                    </div>
                  ))}
                </div>
              </Card>
            ) : null}

            <Button onClick={onCancel}>العودة للوحة التحكم</Button>
          </div>
        );
      }

      return (
        <div className="max-w-4xl mx-auto p-4 space-y-4">
          <Card className="p-4 flex items-center justify-between">
            <div>
              <div className="font-black text-slate-900 dark:text-white">{exam.subject}</div>
              <div className="text-sm text-slate-500 dark:text-slate-400">
                الوقت المتبقي: {minutes}:{seconds}
              </div>
            </div>
            <div className="flex gap-2">
              <button
                className="px-4 py-2 rounded-xl border border-slate-300 dark:border-slate-700"
                onClick={onCancel}
              >
                إلغاء
              </button>
              <Button onClick={handleSubmit}>تسليم</Button>
            </div>
          </Card>

          <Card className="p-6">
            <h2 className="font-black text-slate-900 dark:text-white mb-4">قسم الاختيار من متعدد</h2>
            <div className="space-y-6">
              {mcq.map((q, idx) => (
                <div key={q.id} className="border border-slate-200 dark:border-slate-800 rounded-2xl p-4">
                  <div className="font-bold text-slate-900 dark:text-white mb-4">
                    {idx + 1}. <RichText text={q.text} />
                  </div>
                  <div className="grid gap-3">
                    {q.options.map((opt, i) => (
                      <button
                        key={i}
                        className={cls(
                          "text-right rounded-2xl border p-4 transition",
                          answers[q.id] === i
                            ? "border-slate-900 dark:border-white bg-slate-100 dark:bg-slate-800"
                            : "border-slate-200 dark:border-slate-800"
                        )}
                        onClick={() => setAnswer(q.id, i)}
                      >
                        {opt}
                      </button>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </Card>

          {openQ.length ? (
            <Card className="p-6">
              <h2 className="font-black text-slate-900 dark:text-white mb-4">قسم الأسئلة المقالية</h2>
              <div className="space-y-6">
                {openQ.map((q, idx) => (
                  <div key={q.id} className="border border-slate-200 dark:border-slate-800 rounded-2xl p-4">
                    <div className="font-bold text-slate-900 dark:text-white mb-3">
                      {idx + 1}. <RichText text={q.prompt} />
                    </div>
                    <TextArea
                      rows={8}
                      placeholder="اكتب إجابتك هنا..."
                      value={openAnswers[q.id] || ""}
                      onChange={e => setOpenAnswer(q.id, e.target.value)}
                    />
                  </div>
                ))}
              </div>
            </Card>
          ) : null}
        </div>
      );
    }

    function AdminModal({ onClose, onUploaded, results }) {
      const [password, setPassword] = useState("");
      const [ok, setOk] = useState(false);
      const [jsonText, setJsonText] = useState("");
      const [loading, setLoading] = useState(false);

      async function uploadExam() {
        try {
          setLoading(true);
          const exam = JSON.parse(jsonText);
          await api("uploadExam", {
            adminPassword: CONFIG.ADMIN_PASSWORD,
            exam
          });
          alert("تم رفع الامتحان بنجاح");
          setJsonText("");
          onUploaded();
        } catch (e) {
          alert("فشل الرفع: " + e.message);
        } finally {
          setLoading(false);
        }
      }

      return (
        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
          <Card className="w-full max-w-4xl max-h-[90vh] overflow-auto p-6">
            {!ok ? (
              <>
                <h2 className="text-xl font-black text-slate-900 dark:text-white mb-4">دخول الإدارة</h2>
                <div className="space-y-4">
                  <Input
                    type="password"
                    placeholder="كلمة مرور الإدارة"
                    value={password}
                    onChange={e => setPassword(e.target.value)}
                  />
                  <div className="flex gap-2">
                    <Button onClick={() => {
                      if (password === CONFIG.ADMIN_PASSWORD) setOk(true);
                      else alert("كلمة المرور غير صحيحة");
                    }}>
                      دخول
                    </Button>
                    <button className="px-4 py-3" onClick={onClose}>إغلاق</button>
                  </div>
                </div>
              </>
            ) : (
              <div className="space-y-6">
                <div className="flex items-center justify-between">
                  <h2 className="text-xl font-black text-slate-900 dark:text-white">لوحة الإدارة</h2>
                  <button onClick={onClose}>إغلاق</button>
                </div>

                <div className="grid lg:grid-cols-2 gap-6">
                  <Card className="p-4">
                    <h3 className="font-black text-slate-900 dark:text-white mb-3">رفع امتحان JSON</h3>
                    <TextArea
                      rows={16}
                      placeholder='الصق JSON هنا'
                      value={jsonText}
                      onChange={e => setJsonText(e.target.value)}
                    />
                    <Button className="mt-3" onClick={uploadExam} disabled={loading}>
                      {loading ? "جارٍ الرفع..." : "رفع الامتحان"}
                    </Button>
                  </Card>

                  <Card className="p-4">
                    <h3 className="font-black text-slate-900 dark:text-white mb-3">نتائج الطلاب</h3>
                    <div className="space-y-3 max-h-[500px] overflow-auto">
                      {results.map((r, i) => (
                        <div key={i} className="border border-slate-200 dark:border-slate-800 rounded-2xl p-3">
                          <div className="font-bold text-slate-900 dark:text-white">{r.userName}</div>
                          <div className="text-sm text-slate-500 dark:text-slate-400">{r.subject}</div>
                          <div className="text-sm text-slate-700 dark:text-slate-300">العلامة: {r.score}%</div>
                          <div className="text-xs text-slate-500 dark:text-slate-400">{formatDate(r.createdAt)}</div>
                        </div>
                      ))}
                    </div>
                  </Card>
                </div>
              </div>
            )}
          </Card>
        </div>
      );
    }

    function App() {
      const [user, setUser] = useState(loadLocal(CONFIG.STORAGE_KEYS.user, null));
      const [darkMode, setDarkMode] = useState(loadLocal(CONFIG.STORAGE_KEYS.darkMode, false));
      const [loading, setLoading] = useState(true);
      const [exams, setExams] = useState([]);
      const [stats, setStats] = useState({ avgScore: null, completed: 0 });
      const [wrongQuestions, setWrongQuestions] = useState([]);
      const [selectedExam, setSelectedExam] = useState(null);
      const [adminOpen, setAdminOpen] = useState(false);
      const [allResults, setAllResults] = useState([]);

      useEffect(() => {
        document.documentElement.classList.toggle("dark", !!darkMode);
      }, [darkMode]);

      async function loadDashboardData(currentUser = user) {
        if (!currentUser) return;
        try {
          setLoading(true);
          const [examRes, resultRes] = await Promise.all([
            api("listExams"),
            api("getUserResults", { userId: currentUser.id })
          ]);

          setExams(examRes.exams || []);
          const results = resultRes.results || [];

          const completed = results.length;
          const avgScore = completed
            ? Math.round(results.reduce((a, b) => a + Number(b.score || 0), 0) / completed)
            : null;

          const wrongs = [];
          results.forEach(r => {
            try {
              const arr = JSON.parse(r.wrongItemsJson || "[]");
              arr.forEach(x => wrongs.push(x));
            } catch {}
          });

          setStats({ avgScore, completed });
          setWrongQuestions(wrongs);

          const adminRes = await api("listAllResults", { adminPassword: CONFIG.ADMIN_PASSWORD });
          setAllResults(adminRes.results || []);
        } catch (e) {
          alert("خطأ في التحميل: " + e.message);
        } finally {
          setLoading(false);
        }
      }

      useEffect(() => {
        if (user) loadDashboardData(user);
      }, [user]);

      async function startExam(examId) {
        try {
          setLoading(true);
          const res = await api("getExam", { examId });
          setSelectedExam(res.exam);
        } catch (e) {
          alert("تعذر تحميل الامتحان: " + e.message);
        } finally {
          setLoading(false);
        }
      }

      async function finishExam(payload) {
        try {
          await api("submitResult", payload);
          await loadDashboardData(user);
        } catch (e) {
          alert("فشل حفظ النتيجة: " + e.message);
        }
      }

      function logout() {
        localStorage.removeItem(CONFIG.STORAGE_KEYS.user);
        setUser(null);
      }

      if (!user) {
        return <LoginScreen onLogin={setUser} />;
      }

      return (
        <div className="min-h-screen text-slate-900 dark:text-slate-100">
          <TopBar
            user={user}
            darkMode={darkMode}
            setDarkMode={setDarkMode}
            onOpenAdmin={() => setAdminOpen(true)}
            onLogout={logout}
          />

          {loading ? (
            <div className="max-w-6xl mx-auto p-6">جارٍ التحميل...</div>
          ) : selectedExam ? (
            <ExamScreen
              exam={selectedExam}
              user={user}
              onFinish={finishExam}
              onCancel={() => setSelectedExam(null)}
            />
          ) : (
            <Dashboard
              exams={exams}
              stats={stats}
              wrongQuestions={wrongQuestions}
              onStartExam={startExam}
              refresh={() => loadDashboardData(user)}
            />
          )}

          {adminOpen ? (
            <AdminModal
              onClose={() => setAdminOpen(false)}
              onUploaded={() => loadDashboardData(user)}
              results={allResults}
            />
          ) : null}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
